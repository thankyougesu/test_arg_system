<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株式会社Deus｜都市再生と資産価値の創造</title>
<meta name="description" content="株式会社Deusは都市再生・高級分譲開発・資産運用コンサルティングを行う不動産会社です。">

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
  background-color: #f4f6f8;
  color: #333;
  display: flex;
  flex-direction: column; 
  min-height: 100vh;
}

header {
  background-color: #111;
  color: #fff;
  padding: 20px 10%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  margin: 0;
  font-size: 24px;
}

nav {
  margin-top: 5px;
}

nav a {
  color: #ccc;
  text-decoration: none;
  margin-right: 15px;
  font-size: 14px;
}

nav a:hover {
  color: #fff;
}

.search-box {
  display: flex;
  align-items: center;
}

.search-box input {
  padding: 5px;
  font-size: 14px;
  border: none;
  border-radius: 3px 0 0 3px;
}

.search-box button {
  padding: 6px 10px;
  border: none;
  background-color: #444;
  color: white;
  cursor: pointer;
  border-radius: 0 3px 3px 0;
}

.search-box button:hover {
  background-color: #666;
}

.container {
  padding: 60px 10%;
  flex: 1; 
  box-sizing: border-box;
}

.notice-box {
  background-color: #fff;
  border: 1px solid #dcdfe6;
  border-top: 4px solid #c0392b; 
  padding: 40px;
  border-radius: 4px;
  box-shadow: 0 2px 12px 0 rgba(0,0,0,0.05);
}

.notice-date {
  text-align: right;
  font-size: 14px;
  color: #606266;
  margin-bottom: 20px;
}

.notice-box h2 {
  font-size: 22px;
  color: #2c3e50;
  margin-top: 0;
  margin-bottom: 30px;
  border-bottom: 1px solid #eaeefb;
  padding-bottom: 15px;
}

.notice-content {
  font-size: 15px;
  line-height: 2.0;
  color: #303133;
}

.notice-content p {
  margin: 0 0 20px 0;
}

.notice-footer {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px dashed #eaeefb;
  text-align: right;
  font-size: 14px;
  color: #606266;
}

footer {
  background-color: #111;
  color: #aaa;
  text-align: center;
  padding: 20px;
  font-size: 12px;
  width: 100%;
  box-sizing: border-box;
  margin-top: auto; 
}
</style>
</head>

<body>

<header>
  <div>
    <h1>株式会社Deus</h1>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="company.html">会社概要</a>
      <a href="service.html">事業紹介</a>
      <a href="recruit.html">採用情報</a>
    </nav>
  </div>

  <form class="search-box" onsubmit="search(); return false;">
    <input type="text" id="keyword" placeholder="検索ワードを入力">
    <button type="submit">検索</button>
  </form>
</header>

<div class="container">
  <article class="notice-box">
    <div class="notice-date">2026年6月23日</div>
    
    <h2>IR資料の一時公開停止に関するお知らせ</h2>
    
    <div class="notice-content">
      <p>現在、過去に公開された一部資料について記載内容の整合性確認を実施しております。</p>
      <p>関係各所との協議が完了するまで、該当資料の閲覧を停止いたします。</p>
      <p>なお、本件に関する個別のお問い合わせには回答いたしかねます。</p>
    </div>
    
    <div class="notice-footer">
      以上<br>
      株式会社Deus 財務IR部
    </div>
  </article>
</div>

<footer>
  © 2026 下種のカラクリ All Rights Reserved.<br>
  このサイトはフィクションです。実在の企業・団体・人物とは一切関係ありません。
</footer>

<script src="js/search.js"></script>

</body>
</html>
