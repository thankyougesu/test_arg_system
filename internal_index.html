<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>株式会社Deus｜都市再生と資産価値の創造</title>
<meta name="description" content="株式会社Deusは都市再生・高級分譲開発・資産運用コンサルティングを行う不動産会社です。">
<style>
body {
  margin: 0;
  font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
  background-color: #000000;
  color: #c16d00;
}

header {
  background-color: #2b0006;
  color: #ffffff;
  padding: 20px 10%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  margin: 0;
  font-size: 24px;
}

.container {
  padding: 60px 10%;
}

nav {
  margin-top: 5px;
}

nav a {
  color: #ccc;
  text-decoration: none;
  margin-right: 15px;
  font-size: 14px;
}

nav a:hover {
  color: #fff;
}

.folder-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 40px;
}

.folder {
  text-align: center;
  cursor: pointer;
}

.folder img {
  width: 80px;
  opacity: 0.85;
}

.folder:hover img {
  opacity: 1;
}

.folder-name {
  margin-top: 10px;
  font-size: 14px;
}

/* 検索フォーム */
.search-box {
  display: flex;
  align-items: center;
}

.search-box input {
  padding: 5px;
  font-size: 14px;
  border: none;
  border-radius: 3px 0 0 3px;
}

.search-box button {
  padding: 6px 10px;
  border: none;
  background-color: #444;
  color: white;
  cursor: pointer;
  border-radius: 0 3px 3px 0;
}

.search-box button:hover {
  background-color: #666;
}

.section h3 {
  border-left: 4px solid #000000;
  padding-left: 10px;
}

.hero {
  background-color: #000000;
  color: #c16d00;
  padding: 10px 10%;
}

footer {
  background-color: #111;
  color: #aaa;
  text-align: center;
  padding: 20px;
  font-size: 12px;
}
</style>

<script src="js/auth.js"></script>
</head>

<body>

<header>
  <div>
    <h1>株式会社Deus</h1>
    <nav>
     <a href="index.html">ホーム</a>
      <a href="company.html">会社概要</a>
      <a href="service.html">事業紹介</a>
      <a href="recruit.html">採用情報</a>
    </nav>
  </div>

<!-- 🔎 検索フォーム -->
  <form class="search-box" onsubmit="search(); return false;">
    <input type="text" id="keyword" placeholder="検索ワードを入力">
    <button type="submit">検索</button>
  </form>
</header>

<section class="hero">
  <h2>新規事業部用共有フォルダ</h2>
</section>

<div class="container">
  <div class="folder-grid">

    <div class="folder deleted" onclick="openDeleted()">
      <img src="images/folder.png">
      <div class="folder-name"> 配布用資料</div>
    </div>

    <div class="folder" onclick="openfree()">
      <img src="images/folder.png">
      <div class="folder-name">個人フォルダ</div>
    </div>

  </div>
</div>

<footer>
  © 2026 下種のカラクリ All Rights Reserved.<br>
  このサイトはフィクションです。実在の企業・団体・とは一切関係ありません。
</footer>

<!-- 🔎 search.js 読み込み -->
<script src="js/search.js"></script>

</body>


</html>
